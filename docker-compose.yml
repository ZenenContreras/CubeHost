services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - cubehost-network
    depends_on:
      - frontend
      - api
      - container-manager
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - cubehost-network
    restart: unless-stopped

  api:
    build: ./api
    env_file: ./api/.env
    environment:
      - CONTAINER_MANAGER_URL=http://container-manager:4001
      - FRONTEND_URL=http://localhost
      - DB_PATH=/data/cubehost.db
    volumes:
      - api_data:/data
    networks:
      - cubehost-network
    depends_on:
      - container-manager
    restart: unless-stopped

  container-manager:
    build: ./container-manager
    environment:
      - API_PORT=4001
      - PROXY_PORT=5000
      - DOCKER_NETWORK=cubehost-network
      - DB_PATH=/data/containers.db
      - WORK_DIR=/tmp/cubehost-repos
      - INACTIVITY_TIMEOUT_MS=1800000
      - CONTAINER_CPUS=0.5
      - CONTAINER_MEMORY_MB=256
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - containers_data:/data
      - repos_cache:/tmp/cubehost-repos
    networks:
      - cubehost-network
    restart: unless-stopped

networks:
  cubehost-network:
    driver: bridge
    name: cubehost-network

volumes:
  api_data:
  containers_data:
  repos_cache:
