services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - cubehost-network
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
      container-manager:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - cubehost-network
    restart: unless-stopped

  api:
    build: ./api
    env_file: ./api/.env
    environment:
      - CONTAINER_MANAGER_URL=http://container-manager:4001
      - FRONTEND_URL=http://localhost
      - DB_PATH=/data/cubehost.db
    volumes:
      - api_data:/data
    networks:
      - cubehost-network
    depends_on:
      container-manager:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  container-manager:
    build: ./container-manager
    environment:
      - API_PORT=4001
      - PROXY_PORT=5000
      - DOCKER_NETWORK=cubehost-network
      - DB_PATH=/data/containers.db
      - WORK_DIR=/tmp/cubehost-repos
      - INACTIVITY_TIMEOUT_MS=1800000
      - CONTAINER_CPUS=0.5
      - CONTAINER_MEMORY_MB=256
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - containers_data:/data
      - repos_cache:/tmp/cubehost-repos
    networks:
      - cubehost-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cubehost-network:
    driver: bridge
    name: cubehost-network

volumes:
  api_data:
  containers_data:
  repos_cache: